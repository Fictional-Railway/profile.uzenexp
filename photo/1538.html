<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【架空鉄道】羽前急行 - 管理人ページ</title>
    <link rel="icon" href="favicon.ico">
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="./favicon.ico">
    <link rel="icon" type="image/png" href="./favicon.ico">

    <style>
        body {
            font-family: "MS PGothic", "ＭＳ Ｐゴシック", "MS P-Gothic", "Osaka", sans-serif; 
            margin: 0;
            padding: 10px;
            background-color: #c0c0c0;
            background-image: radial-gradient(#d0d0d0 1px, transparent 1px);
            background-size: 8px 8px;
            color: #000;
        }

        main {
            background: #fff;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            border: 4px outset #eee;
        }

        header {
            background: url(https://uzen-exp.jp/image/%E6%9C%88%E5%B1%B116-9_20260210.png);
            background-size: cover;
            background-position: center;
            padding: 60px 20px;
            color: white;
            text-shadow: 2px 2px 0px #000;
            border: 3px inset #ccc;
            margin-bottom: 20px;
        }

        .header-title {
            text-align: center;
            font-size: 2.2rem;
            font-weight: bold;
        }

        .marquee-container {
            background: #000;
            color: #ff9900;
            padding: 5px;
            border: 2px inset #444;
            font-weight: bold;
            margin-bottom: 25px;
            overflow: hidden;
            white-space: nowrap;
            box-sizing: border-box;
        }

        .marquee-content {
            display: inline-block;
            padding-left: 100%;
            animation: marquee 15s linear infinite;
        }

        @keyframes marquee {
            0%   { transform: translate(0, 0); }
            100% { transform: translate(-100%, 0); }
        }

        h2.top {
            background: linear-gradient(to right, #000080, #1084d0);
            color: #fff;
            padding: 4px 10px;
            font-size: 1.1rem;
            border: 1px solid #000;
            margin-bottom: 15px;
        }

        .section-box {
            border: 1px solid #808080;
            padding: 12px;
            margin-bottom: 20px;
            background: #ffffff;
            line-height: 1.8;
        }

        .section-title {
            font-weight: bold;
            color: #ff0050;
            background: #fff;
            padding: 0 5px;
            margin-top: -22px;
            display: inline-block;
            border: 1px dashed #aeaeae;
        }

        a { font-weight: bold; }
        a:link { color: #0000ff; }
        a:visited { color: #800080; }
        a:hover { color: #ff0000; background: #ffff00; }

        footer {
            margin-top: 40px;
            border-top: 1px dashed #666;
            padding-top: 20px;
            text-align: center;
        }

        .hit-counter {
            background: #000;
            color: #fff;
            padding: 5px 15px;
            display: inline-block;
            border: 2px solid #fff;
            font-family: "Courier New", monospace;
            margin-bottom: 10px;
        }

        .counter-images {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 2px;
            margin: 5px 0;
        }

        .mbonly-br {
            display: none;
        }

        @media (max-width: 400px) {
            .mbonly-br {
                display: inline;
            }
        }

        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 40px;
        }

        .photo-item {
            border: 1px solid var(--line-light);
            padding: 8px;
            background: #ffffff;
            transition: 0.2s;
        }

        .photo-item:hover {
            border-color: var(--line-dark); 
        }

        .photo-item img {
            width: 70%;
            height: auto;
            object-fit: cover;
            aspect-ratio: 3 / 2;
            margin: 0 auto;
            border: #d8d8d8 solid 3px;
            margin: 0 auto;
        }

        @media (max-width: 768px) {
            .photo-item img {
                width: 100%;
            }
        }

        .photo-caption {
            font-size: 0.7rem;
            color: var(--sub-color);
            margin-top: 10px;
            font-weight: bold;
            line-height: 1.2;
            text-align: center;
        }

        .oto {
            display: block;
            width: 70%;
            margin: 0 auto;
        }

        @media (max-width: 768px) {
            .oto {
                width: 100%;
            }
        }

        .list:hover {
            background: none;
            border-bottom: #000 solid 1px;
        }
    </style>
</head>
<body>
    <main>
        
            <br>

        <div class="container">
                
            <div class="photo-item">
                    <img src="../img/IMG_1538.JPG" alt="作品4">
                    <div class="photo-caption">2026.02.08 / 秩父鉄道荒川橋梁</div>
                </div>
            <p><a href="../photo.html">写真集に戻る →</a></p>
            
        </div>
    </main>
</body>
</html>
