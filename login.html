<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>羽前急行(パスワード付きページ)</title>
    <style>
        body { 
            font-family: "MS PGothic", "ＭＳ Ｐゴシック", "MS P-Gothic", "Osaka", "MS Gothic", "ＭＳ ゴシック", sans-serif; 
            margin: 5px;
            max-width: 800px;
            margin: 5px auto;
            line-height: 1.6;
            background: #e3e3e3;
            text-align: center;
        }

        main {
            background: #fff;
            padding: 20px;
        }

        input { padding: 10px; font-size: 16px; width: 200px; margin-bottom: 10px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>
    <main>

    <h2>パスワードが必要です</h2>
    <p>この先は関係者専用ページです。</p>
    
    <input type="password" id="passwordInput" placeholder="パスワードを入力">
    <br>
    <button onclick="login()">ページを開く</button>

    <p style="margin-top: 30px;"><a href="index.html">トップページに戻る</a></p>

    </main>

    <script>
        async function login() {
            const password = document.getElementById('passwordInput').value;
            if (!password) { alert("パスワードを入力してください"); return; }

            try {
                const msgUint8 = new TextEncoder().encode(password);
                const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
                const hashArray = Array.from(new Uint8Array(hashBuffer));
                const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
                window.location.href = hashHex + ".html";
            } catch (error) {
                alert("エラーが発生しました。");
            }
        }
        document.getElementById('passwordInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') login();
        });
    </script>

</body>
</html>
