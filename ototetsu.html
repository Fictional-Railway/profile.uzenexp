<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【架空鉄道】羽前急行 - 管理人ページ</title>

    <style>
        body {
            font-family: "MS PGothic", "ＭＳ Ｐゴシック", "MS P-Gothic", "Osaka", sans-serif; 
            margin: 0;
            padding: 10px;
            background-color: #c0c0c0;
            background-image: radial-gradient(#d0d0d0 1px, transparent 1px);
            background-size: 8px 8px;
            color: #000;
        }

        main {
            background: #fff;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            border: 4px outset #eee;
        }

        header {
            background: url(https://uzen-exp.jp/image/%E6%9C%88%E5%B1%B116-9_20260210.png);
            background-size: cover;
            background-position: center;
            padding: 60px 20px;
            color: white;
            text-shadow: 2px 2px 0px #000;
            border: 3px inset #ccc;
            margin-bottom: 20px;
        }

        .header-title {
            text-align: center;
            font-size: 2.2rem;
            font-weight: bold;
        }

        .marquee-container {
            background: #000;
            color: #ff9900;
            padding: 5px;
            border: 2px inset #444;
            font-weight: bold;
            margin-bottom: 25px;
            overflow: hidden;
            white-space: nowrap;
            box-sizing: border-box;
        }

        .marquee-content {
            display: inline-block;
            padding-left: 100%;
            animation: marquee 15s linear infinite;
        }

        @keyframes marquee {
            0%   { transform: translate(0, 0); }
            100% { transform: translate(-100%, 0); }
        }

        h2.top {
            background: linear-gradient(to right, #000080, #1084d0);
            color: #fff;
            padding: 4px 10px;
            font-size: 1.1rem;
            border: 1px solid #000;
            margin-bottom: 15px;
        }

        .section-box {
            border: 1px solid #808080;
            padding: 12px;
            margin-bottom: 20px;
            background: #ffffff;
            line-height: 1.8;
        }

        .section-title {
            font-weight: bold;
            color: #ff0050;
            background: #fff;
            padding: 0 5px;
            margin-top: -22px;
            display: inline-block;
            border: 1px dashed #aeaeae;
        }

        a { font-weight: bold; }
        a:link { color: #0000ff; }
        a:visited { color: #800080; }
        a:hover { color: #ff0000; background: #ffff00; }

        footer {
            margin-top: 40px;
            border-top: 1px dashed #666;
            padding-top: 20px;
            text-align: center;
        }

        .hit-counter {
            background: #000;
            color: #fff;
            padding: 5px 15px;
            display: inline-block;
            border: 2px solid #fff;
            font-family: "Courier New", monospace;
            margin-bottom: 10px;
        }

        .counter-images {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 2px;
            margin: 5px 0;
        }

        .mbonly-br {
            display: none;
        }

        @media (max-width: 400px) {
            .mbonly-br {
                display: inline;
            }
        }
    </style>
</head>
<body>
    <main>
        <header>
            <div class="header-title">QRコード</div>
        </header>

        <div style="display: flex; flex-direction: column; align-items: center;">
            <img src="./ototetsu_qr.jpg" width="300px" alt="">
        </div>

        <br>

        <a href="./index.html">トップページに戻る</a>

        <footer>
            <div style="font-size: 0.75rem; color: #666; margin-top: 20px;">
                <span>&copy; 2025- Uzen-Express Railway (Nagi_san096) All Rights Reserved.</span><br>
                <br>
                <span>このサイトの構成には一部AIを使用しております。(内容はすべて手書きです)</span><br>
                <b>最終更新: 2026/03/16</b>
            </div>
        </footer>
    </main>
</body>
</html>
