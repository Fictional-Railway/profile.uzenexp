<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【レトロ風】乗降促進スイッチ</title>
    <link rel="shortcut icon" href="favicon.ico" type="image/vnd.microsoft.icon">
    <link rel="icon" href="favicon.ico">
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="./favicon.ico">
    <link rel="icon" type="image/png" href="./favicon.ico">
    <style>
        body {
            background-color: #5b696b;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: "MS Gothic", "ＭＳ ゴシック", monospace;
        }

        .control-panel {
            background-color: #dcd8c5; 
            padding: 40px 50px;
            border: 4px solid #8c8c8c;
            border-radius: 8px;
            box-shadow: 
                8px 8px 0px rgba(0,0,0,0.4),
                inset 2px 2px 5px rgba(255,255,255,0.8),
                inset -3px -3px 6px rgba(0,0,0,0.2);
            text-align: center;

            
        }

        .label-plate {
            background: #222;
            color: #eee;
            padding: 5px 15px;
            margin-bottom: 30px;
            border: 2px solid #555;
            display: inline-block;
            font-size: 1.2rem;
            letter-spacing: 2px;
            box-shadow: inset 1px 1px 3px #000, 1px 1px 1px rgba(255,255,255,0.5);
            border-radius: 2px;
        }

        .retro-btn {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: radial-gradient(circle, #d35400, #a0281b); 
            border: 10px solid #2c3e50; 
            box-shadow: 
                0 15px 0 #6e1c13,
                0 20px 10px rgba(0,0,0,0.6);
            cursor: pointer;
            transition: transform 0.05s, box-shadow 0.05s; 
            outline: none;
            display: block;
            margin: 0 auto;
        }

        /* 押し込んだ時のガチャン！という挙動 */
        .retro-btn:active {
            transform: translateY(15px);
            box-shadow: 
                0 0 0 #6e1c13, 
                0 2px 3px rgba(0,0,0,0.6);
        }

        .led-screen {
            margin-top: 40px;
            background: #1a1a1a;
            color: #2ecc71;
            padding: 10px;
            border: 3px inset #555;
            font-size: 1.1rem;
            text-shadow: 0 0 5px currentColor;
            min-height: 1.5em;
        }
    </style>
</head>
<body>

    <div class="control-panel">
        <div class="label-plate">乗降促進</div>
        
        <button id="train-btn" class="retro-btn"></button>
        
        <div id="status-display" class="led-screen">待機中</div>
    </div>

    <script>
        document.body.addEventListener('click', function(e) {
            if (!e.target.closest('.control-panel')) {
                window.location.href = "https://group.uzen-exp.jp";
            }
        });
    </script>

    <audio id="audio-melody" src="./departure_sign_endless.mp3" preload="auto"></audio>
    <audio id="audio-close" src="./announcement.wav" preload="auto"></audio>

    <script>
        const btn = document.getElementById('train-btn');
        const display = document.getElementById('status-display');
        const audioMelody = document.getElementById('audio-melody');
        const audioClose = document.getElementById('audio-close');

        let state = 0;

        btn.addEventListener('click', () => {
            if (state === 0) {

                audioClose.pause(); 
                audioClose.currentTime = 0;

                audioMelody.currentTime = 0;
                audioMelody.play().catch(e => console.log("再生エラー:", e));
                
                state = 1;
                
                display.innerText = "ﾒﾛﾃﾞｨ鳴動中";
                display.style.color = "#e74c3c";

            } else if (state === 1) {

                audioMelody.pause();
                
                state = 0; 

                const delayTime = 800; 

                setTimeout(() => {
                    audioClose.currentTime = 0;
                    audioClose.play().catch(e => console.log(e));
                    
                    display.innerText = "閉扉放送中";
                    display.style.color = "#f1c40f";
                }, delayTime);
            }
        });

        audioClose.addEventListener('ended', () => {
            if (state === 0) {
                display.innerText = "待機中";
                display.style.color = "#2ecc71";
            }
        });
    </script>
</body>
</html>
