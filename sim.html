<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>独立操作式 LED方向幕シミュレーター</title>
    <style>
        :root {
            --display-width: 800px;
            --display-height: 300px;
            --led-dot-size: 4px;
        }

        body {
            background-color: #1a1a1a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
            font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
        }

        .led-board {
            position: relative;
            width: var(--display-width);
            height: var(--display-height);
            background-color: #050505;
            border: 12px solid #333;
            border-bottom-color: #222;
            border-right-color: #222;
            border-radius: 10px;
            display: flex;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        .layer-image {
            display: flex;
            width: 100%;
            height: 100%;
        }
        .led-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            background-image: radial-gradient(rgba(0,0,0,0.7) 45%, transparent 45%);
            background-size: var(--led-dot-size) var(--led-dot-size);
            background-color: rgba(0, 0, 0, 0.05);
        }

        .panel {
            margin-top: 40px;
            display: flex;
            gap: 40px;
            background: #333;
            padding: 25px;
            border-radius: 15px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .control-group h3 {
            margin: 0 0 10px 0;
            font-size: 14px;
            text-align: center;
            color: #ccc;
            border-bottom: 1px solid #555;
            padding-bottom: 5px;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        button {
            padding: 10px 15px;
            font-size: 13px;
            cursor: pointer;
            background: #444;
            color: #fff;
            border: 1px solid #666;
            border-radius: 4px;
            transition: all 0.2s;
        }

        button:hover { background: #555; border-color: #888; }
        button:active { transform: translateY(2px); background: #222; }

    </style>
</head>
<body>

    <div class="led-board">
        <div class="layer-image">
            <img id="display-type" class="type-img" src="./houkoumaku/futsu.PNG" alt="種別">
            <img id="display-dest" class="dest-img" src="./houkoumaku/sakata.PNG" alt="行先">
        </div>
        <div class="led-overlay"></div>
    </div>

    <div class="panel">
        <div class="control-group">
            <h3>種別設定</h3>
            <div class="btn-grid">
                <button onclick="updateType('./houkoumaku/futsu.PNG')">普通</button>
                <button onclick="updateType('./houkoumaku/kyuko.PNG')">急行</button>
                <button onclick="updateType('./houkoumaku/tokkyu.PNG')">特急</button>
                <button onclick="updateType('./houkoumaku/kuhaku_syubetsu.PNG')">空白</button>
            </div>
        </div>

        <div class="control-group">
            <h3>行先設定</h3>
            <div class="btn-grid">
                <button onclick="updateDest('./houkoumaku/sakata.PNG')">酒田</button>
                <button onclick="updateDest('./houkoumaku/yamagata.PNG')">山形</button>
                <button onclick="updateDest('./houkoumaku/tsuruoka.PNG')">鶴岡</button>
                <button onclick="updateDest('./houkoumaku/mikawa.PNG')">三川</button>
                <button onclick="updateDest('./houkoumaku/kuhaku_ikisaki.PNG')">空白</button>
            </div>
        </div>
    </div>

    <script>
        function updateType(path) {
            const el = document.getElementById('display-type');
            el.style.opacity = 0; 
            setTimeout(() => {
                el.src = path;
                el.style.opacity = 1;
            }, 100);
        }

        function updateDest(path) {
            const el = document.getElementById('display-dest');
            el.style.opacity = 0; 
            setTimeout(() => {
                el.src = path;
                el.style.opacity = 1;
            }, 100);
        }
    </script>

</body>
</html>
