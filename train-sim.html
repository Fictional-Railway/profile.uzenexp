<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Urban Railway Simulator - Advanced</title>
<style>
body { margin: 0; padding: 0; overflow: hidden; background-color: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; user-select: none; }
#view { display: block; width: 100vw; height: 100vh; }
#ui { position: absolute; bottom: 0; width: 100%; height: 160px; background: linear-gradient(180deg, rgba(10,15,20,0.95), rgba(0,0,0,1)); border-top: 2px solid #3498db; display: flex; color: #fff; box-sizing: border-box; padding: 10px; z-index: 10; box-shadow: 0 -5px 20px rgba(52, 152, 219, 0.2); }
.panel { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; border-right: 1px solid #2c3e50; }
.panel:last-child { border-right: none; }
.title { font-size: 14px; color: #7f8c8d; letter-spacing: 3px; margin-bottom: 5px; }
.value { font-size: 52px; font-family: monospace; font-weight: bold; color: #2ecc71; text-shadow: 0 0 15px rgba(46, 204, 113, 0.6); }
.value.warn { color: #f39c12; text-shadow: 0 0 15px rgba(243, 156, 18, 0.6); }
.value.danger { color: #e74c3c; text-shadow: 0 0 15px rgba(231, 76, 60, 0.6); }
.controls { display: flex; gap: 15px; margin-top: 10px; }
.btn { width: 80px; height: 40px; background: #2c3e50; border: 1px solid #34495e; color: #ecf0f1; font-weight: bold; font-size: 16px; border-radius: 4px; cursor: pointer; transition: 0.1s; }
.btn:active { background: #3498db; color: #fff; box-shadow: 0 0 10px #3498db; }
#start-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #1a252f, #000); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
#start-screen h1 { color: #ecf0f1; font-size: 48px; margin-bottom: 40px; letter-spacing: 5px; text-shadow: 0 0 20px rgba(52, 152, 219, 0.8); }
#start-btn { padding: 20px 60px; font-size: 28px; background: transparent; color: #3498db; border: 2px solid #3498db; border-radius: 50px; cursor: pointer; transition: 0.3s; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; }
#start-btn:hover { background: #3498db; color: #fff; box-shadow: 0 0 30px rgba(52, 152, 219, 0.6); }
#guide { color: #95a5a6; margin-top: 30px; font-size: 18px; text-align: center; line-height: 1.6; }
#guide kbd { background: #333; padding: 4px 8px; border-radius: 4px; border: 1px solid #555; color: #fff; }
#msg { position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%); font-size: 64px; color: #fff; font-weight: bold; text-shadow: 0 0 30px #3498db; opacity: 0; transition: opacity 0.5s; z-index: 20; pointer-events: none; }
</style>
</head>
<body>
<div id="start-screen">
  <h1>NIGHT CITY TRANSIT</h1>
  <button id="start-btn">SYSTEM START</button>
  <div id="guide">
    キーボード操作<br>
    加速 (P1〜P5) : <kbd>↑</kbd> キー <br>
    減速 (B1〜B8, EB) : <kbd>↓</kbd> キー
  </div>
</div>
<div id="msg">停車駅</div>
<canvas id="view"></canvas>
<div id="ui">
  <div class="panel">
    <div class="title">SPEED (km/h)</div>
    <div id="speed-val" class="value">0.0</div>
  </div>
  <div class="panel">
    <div class="title">MASTER CONTROLLER</div>
    <div id="mascon-val" class="value">N</div>
    <div class="controls">
      <button class="btn" id="btn-p">P (↑)</button>
      <button class="btn" id="btn-b">B (↓)</button>
    </div>
  </div>
  <div class="panel">
    <div class="title">NEXT STATION (m)</div>
    <div id="dist-val" class="value">2500.0</div>
  </div>
</div>
<script>
const d = document;
const w = window;
const cvs = d.getElementById('view');
const ctx = cvs.getContext('2d');
const uiSpeed = d.getElementById('speed-val');
const uiMascon = d.getElementById('mascon-val');
const uiDist = d.getElementById('dist-val');
const msg = d.getElementById('msg');

let W, H, cx, cy;
function resize() {
  W = cvs.width = w.innerWidth;
  H = cvs.height = w.innerHeight;
  cx = W / 2;
  cy = H * 0.5; // 地平線を画面中央に設定（目線を高く）
}
w.addEventListener('resize', resize);
resize();

let actx, mGain, osc, nSrc, nGain;
let audioInit = false;
function initAudio() {
  if (audioInit) return;
  const AudioContext = w.AudioContext || w.webkitAudioContext;
  actx = new AudioContext();
  
  // モーター音用ゲインとオシレータ（抵抗制御風に矩形波）
  mGain = actx.createGain();
  mGain.connect(actx.destination);
  mGain.gain.value = 0;
  osc = actx.createOscillator();
  osc.type = 'square'; // 抵抗制御らしいブー音
  osc.connect(mGain);
  osc.start();
  
  // 走行音用（ノイズ）
  const bS = actx.sampleRate * 2;
  const buf = actx.createBuffer(1, bS, actx.sampleRate);
  const oD = buf.getChannelData(0);
  for (let i = 0; i < bS; i++) {
    oD[i] = Math.random() * 2 - 1;
  }
  nGain = actx.createGain();
  nGain.connect(actx.destination);
  nGain.gain.value = 0;
  nSrc = actx.createBufferSource();
  nSrc.buffer = buf;
  nSrc.loop = true;
  nSrc.connect(nGain);
  nSrc.start();
  audioInit = true;
}

let speed = 0;
let distance = 2500;
let mascon = 0;
let posZ = 0;

// 加速力をマイルドに調整
const pRates = [0, 0.2, 0.4, 0.7, 1.0, 1.3];
const bRates = [0, 0.5, 1.0, 1.5, 2.0, 2.5, 3.0, 3.5, 4.0, 5.5];
const maxS = 33.33; // 約120km/h

function updateUI() {
  if (mascon > 0) {
    uiMascon.innerText = 'P' + mascon;
    uiMascon.className = 'value warn';
  } else if (mascon < 0) {
    if (mascon === -9) {
      uiMascon.innerText = 'EB';
      uiMascon.className = 'value danger';
    } else {
      uiMascon.innerText = 'B' + Math.abs(mascon);
      uiMascon.className = 'value danger';
    }
  } else {
    uiMascon.innerText = 'N';
    uiMascon.className = 'value';
  }
}

function notchUp() {
  if (mascon < 5) mascon++;
  updateUI();
}

function notchDown() {
  if (mascon > -9) mascon--;
  updateUI();
}

d.getElementById('btn-p').addEventListener('mousedown', notchUp);
d.getElementById('btn-b').addEventListener('mousedown', notchDown);
w.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowUp') notchUp();
  if (e.key === 'ArrowDown') notchDown();
});

const scenery = [];
// 建物の生成
for (let i = 0; i < 250; i++) {
  const isLeft = Math.random() > 0.5;
  const x = (isLeft ? -1 : 1) * (15 + Math.random() * 80);
  const z = Math.random() * 3000;
  const w_b = 8 + Math.random() * 20;
  const h = 20 + Math.random() * 100;
  const win = [];
  if (Math.random() > 0.3) {
    for (let wy = 5; wy < h - 5; wy += 8) {
      for (let wx = 2; wx < w_b - 2; wx += 6) {
        if (Math.random() > 0.4) {
          win.push({x: wx, y: wy});
        }
      }
    }
  }
  scenery.push({type: 'b', x, z, w: w_b, h, win});
}
// 架線柱の生成
for (let i = 0; i < 60; i++) {
  scenery.push({type: 'p', x: -5, z: i * 50});
  scenery.push({type: 'p', x: 5, z: i * 50});
}

let lastT = performance.now();

function loop(t) {
  const dt = Math.min((t - lastT) / 1000, 0.1);
  lastT = t;
  let acc = 0;
  
  if (mascon > 0) acc = pRates[mascon];
  else if (mascon < 0) acc = -bRates[Math.abs(mascon)];
  
  const drag = speed * 0.015 + (speed * speed) * 0.0002;
  speed += (acc - drag) * dt;
  if (speed < 0) speed = 0;
  if (speed > maxS) speed = maxS;
  
  const move = speed * dt;
  posZ += move;
  if (distance > 0) {
    distance -= move;
    if (distance < 0) distance = 0;
  }

  if (audioInit) {
    // 抵抗制御風のモーター音
    if (mascon > 0 && speed > 0.1) {
      // 速度に比例して低い音からピッチが上がる
      osc.frequency.value = 40 + (speed / maxS) * 150;
      mGain.gain.setTargetAtTime(0.05 + (mascon * 0.01), actx.currentTime, 0.1);
    } else {
      mGain.gain.setTargetAtTime(0, actx.currentTime, 0.2);
    }
    // 走行音の音量を大幅に下げる (0.3 -> 0.05)
    const nVol = (speed / maxS) * 0.05;
    nGain.gain.setTargetAtTime(nVol, actx.currentTime, 0.1);
  }

  // UI更新
  if (distance === 0 && speed === 0) {
    msg.style.opacity = 1;
    msg.innerText = "ARRIVED";
    setTimeout(() => {
      if (distance === 0) {
        distance = 2500 + Math.random() * 1000;
        msg.style.opacity = 0;
      }
    }, 4000);
  } else if (distance < 500) {
    msg.style.opacity = 1;
    msg.innerText = "APPROACHING";
    msg.style.fontSize = "48px";
  } else {
    msg.style.opacity = 0;
    msg.style.fontSize = "64px";
  }

  const kmh = speed * 3.6;
  uiSpeed.innerText = kmh.toFixed(1);
  uiDist.innerText = distance.toFixed(1);

  // --- 描画処理 ---
  // 背景（空）
  const gradSky = ctx.createLinearGradient(0, 0, 0, cy);
  gradSky.addColorStop(0, '#050a1f');
  gradSky.addColorStop(1, '#1b2735');
  ctx.fillStyle = gradSky;
  ctx.fillRect(0, 0, W, cy);
  
  // 背景（地上 - 高架なのではるか下）
  const gradGnd = ctx.createLinearGradient(0, cy, 0, H);
  gradGnd.addColorStop(0, '#05080c');
  gradGnd.addColorStop(1, '#0a0a0a');
  ctx.fillStyle = gradGnd;
  ctx.fillRect(0, cy, W, H - cy);

  const fov = 400;
  const camH_rail = 3;   // 線路面からカメラ(運転席)までの高さ
  const camH_ground = 12; // 地面からカメラまでの高さ (高架表現)

  // --- 高架の道床と防音壁の描画 ---
  const gndY1 = cy + camH_rail * (fov / 1); // 手前の線路Y
  const gndY2 = cy + (camH_rail - 1.5) * (fov / 1); // 防音壁上部
  const wallX = 7 * (fov / 1);

  // 高架床
  ctx.fillStyle = '#2a2f35';
  ctx.beginPath();
  ctx.moveTo(cx - wallX, gndY1);
  ctx.lineTo(cx + wallX, gndY1);
  ctx.lineTo(cx, cy);
  ctx.fill();

  // 左右防音壁
  ctx.fillStyle = '#1e242b';
  ctx.beginPath();
  ctx.moveTo(cx - wallX, gndY1);
  ctx.lineTo(cx - wallX, gndY2);
  ctx.lineTo(cx, cy);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(cx + wallX, gndY1);
  ctx.lineTo(cx + wallX, gndY2);
  ctx.lineTo(cx, cy);
  ctx.fill();

  // --- オブジェクトのZソートとリスト化 ---
  const drawList = [];
  const loopZ = 3000;
  
  // 建物・架線柱
  scenery.forEach(s => {
    let relZ = (s.z - posZ) % loopZ;
    if (relZ < 0) relZ += loopZ;
    if (relZ > 1) {
      drawList.push({...s, relZ});
    }
  });

  // 駅ホームのセグメントを追加 (長さ200m、前方50m〜後方150m)
  const stationStart = distance - 150;
  const stationEnd = distance + 50;
  for (let z = stationStart; z < stationEnd; z += 10) {
    if (z > 1 && z < 2000) {
      drawList.push({type: 'platform', relZ: z});
    }
  }

  drawList.sort((a, b) => b.relZ - a.relZ);

  // --- オブジェクトの描画 ---
  drawList.forEach(s => {
    if (s.type === 'platform') {
      // 駅の描画（10mブロック）
      const zNear = Math.max(1, s.relZ - 10);
      const zFar = s.relZ;
      const sN = fov / zNear;
      const sF = fov / zFar;
      
      const py_rN = cy + camH_rail * sN;
      const py_rF = cy + camH_rail * sF;
      const py_tN = cy + (camH_rail - 1.2) * sN; // ホーム高さ1.2m
      const py_tF = cy + (camH_rail - 1.2) * sF;
      
      const px_iN = cx - 3.5 * sN; // 内側
      const px_iF = cx - 3.5 * sF;
      const px_oN = cx - 12 * sN;  // 外側
      const px_oF = cx - 12 * sF;

      // 側面
      ctx.fillStyle = '#556';
      ctx.beginPath();
      ctx.moveTo(px_iN, py_tN);
      ctx.lineTo(px_iF, py_tF);
      ctx.lineTo(px_iF, py_rF);
      ctx.lineTo(px_iN, py_rN);
      ctx.fill();

      // 上面
      ctx.fillStyle = '#9aa1a6';
      ctx.beginPath();
      ctx.moveTo(px_iN, py_tN);
      ctx.lineTo(px_iF, py_tF);
      ctx.lineTo(px_oF, py_tF);
      ctx.lineTo(px_oN, py_tN);
      ctx.fill();

      // 点字ブロック
      ctx.fillStyle = '#f1c40f';
      ctx.beginPath();
      ctx.moveTo(cx - 4.2 * sN, py_tN);
      ctx.lineTo(cx - 4.2 * sF, py_tF);
      ctx.lineTo(cx - 4.4 * sF, py_tF);
      ctx.lineTo(cx - 4.4 * sN, py_tN);
      ctx.fill();

      // ホーム柱
      ctx.fillStyle = '#7f8c8d';
      ctx.fillRect(cx - 6 * sN, py_tN - 4 * sN, 0.4 * sN, 4 * sN);

      // 屋根
      ctx.fillStyle = '#34495e';
      ctx.beginPath();
      ctx.moveTo(px_iN + 1 * sN, py_tN - 4 * sN);
      ctx.lineTo(px_iF + 1 * sF, py_tF - 4 * sF);
      ctx.lineTo(px_oF, py_tF - 4 * sF);
      ctx.lineTo(px_oN, py_tN - 4 * sN);
      ctx.fill();

    } else {
      const scale = fov / s.relZ;
      const px = cx + s.x * scale;
      
      if (s.type === 'b') {
        // 建物の底辺は高架の下 (camH_ground) に設定
        const py_gnd = cy + camH_ground * scale; 
        const bw = s.w * scale;
        const bh = s.h * scale;
        ctx.fillStyle = '#0f141e';
        ctx.fillRect(px - (s.x < 0 ? bw : 0), py_gnd - bh, bw, bh);
        ctx.strokeStyle = '#1a252f';
        ctx.lineWidth = 1;
        ctx.strokeRect(px - (s.x < 0 ? bw : 0), py_gnd - bh, bw, bh);
        ctx.fillStyle = '#f1c40f';
        s.win.forEach(w => {
          ctx.globalAlpha = Math.random() > 0.05 ? 0.8 : 0.2;
          ctx.fillRect(px - (s.x < 0 ? bw : 0) + w.x * scale, py_gnd - bh + w.y * scale, 3 * scale, 4 * scale);
        });
        ctx.globalAlpha = 1.0;
      } else if (s.type === 'p') {
        // 架線柱は線路の高さ (camH_rail) に設定
        const py_rail = cy + camH_rail * scale;
        const ph = 12 * scale;
        const pw = 0.5 * scale;
        ctx.fillStyle = '#555';
        ctx.fillRect(px - pw / 2, py_rail - ph, pw, ph);
        if (s.x < 0) {
          ctx.beginPath();
          ctx.moveTo(px, py_rail - ph * 0.9);
          ctx.lineTo(cx + 5 * scale, py_rail - ph * 0.9);
          ctx.strokeStyle = '#444';
          ctx.lineWidth = Math.max(0.5, 2 * scale);
          ctx.stroke();
        }
      }
    }
  });

  // --- 枕木と線路の描画 ---
  const tW = 3.0;
  for (let i = 0; i < 15; i++) {
    let rZ = ((i * 10) - posZ) % 150;
    if (rZ < 0) rZ += 150;
    if (rZ > 1) {
      const sc = fov / rZ;
      const sy = cy + camH_rail * sc;
      const sw = tW * 1.2 * sc;
      if (sy > cy && sy < H) {
        ctx.fillStyle = '#111';
        ctx.fillRect(cx - sw / 2, sy, sw, 0.5 * sc);
      }
    }
  }

  // レール
  ctx.beginPath();
  ctx.moveTo(cx - (tW / 2) * (fov / 1), cy + camH_rail * (fov / 1));
  ctx.lineTo(cx, cy);
  ctx.moveTo(cx + (tW / 2) * (fov / 1), cy + camH_rail * (fov / 1));
  ctx.lineTo(cx, cy);
  ctx.strokeStyle = '#666';
  ctx.lineWidth = 3;
  ctx.stroke();

  w.requestAnimationFrame(loop);
}

d.getElementById('start-btn').addEventListener('click', () => {
  initAudio();
  d.getElementById('start-screen').style.display = 'none';
  lastT = performance.now();
  w.requestAnimationFrame(loop);
});
</script>
</body>
</html>
